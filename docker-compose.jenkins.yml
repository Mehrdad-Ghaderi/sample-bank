services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    container_name: sample-bank-jenkins
    user: root
    ports:
      - "9090:8080"
      - "50001:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
      - ${JENKINS_KUBECONFIG_HOST_PATH:?Set JENKINS_KUBECONFIG_HOST_PATH in your shell or .env.jenkins file}:/root/.kube/config.host:ro
      - ${JENKINS_MINIKUBE_HOME_HOST_PATH:?Set JENKINS_MINIKUBE_HOME_HOST_PATH in your shell or .env.jenkins file}:/root/.minikube:ro
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
      KUBECONFIG_HOST: "/root/.kube/config.host"
      MINIKUBE_HOME: "/root/.minikube"
