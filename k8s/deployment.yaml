apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-bank
  namespace: sample-bank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-bank
  template:
    metadata:
      labels:
        app: sample-bank
    spec:
      containers:
        - name: app
          image: ghcr.io/mehrdad-ghaderi/sample-bank:replace-at-deploy-time
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sample-bank-config
            - secretRef:
                name: sample-bank-secrets
