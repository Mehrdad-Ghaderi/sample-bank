spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
app.security.bootstrap-user.enabled=true
app.security.bootstrap-user.username=${BOOTSTRAP_USERNAME:user}
app.security.bootstrap-user.password=${BOOTSTRAP_PASSWORD:pass}
app.security.bootstrap-user.role=${BOOTSTRAP_ROLE:USER}
