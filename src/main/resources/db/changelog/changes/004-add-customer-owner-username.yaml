databaseChangeLog:
  - changeSet:
      id: 004-add-customer-owner-username
      author: mehrdad
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: customer_entity
              columnName: owner_username
      changes:
        - addColumn:
            tableName: customer_entity
            columns:
              - column:
                  name: owner_username
                  type: varchar(100)
                  defaultValue: user
                  constraints:
                    nullable: false
        - createIndex:
            tableName: customer_entity
            indexName: idx_customer_owner_username
            columns:
              - column:
                  name: owner_username
