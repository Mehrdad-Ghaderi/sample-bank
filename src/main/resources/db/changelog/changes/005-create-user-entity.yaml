databaseChangeLog:
  - changeSet:
      id: 005-create-user-entity
      author: mehrdad
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: user_entity
      changes:
        - createTable:
            tableName: user_entity
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_entity
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_entity
            columnNames: username
            constraintName: uk_user_username
        - createIndex:
            tableName: user_entity
            indexName: idx_user_enabled
            columns:
              - column:
                  name: enabled
        - sql:
            dbms: postgresql
            sql: ALTER TABLE user_entity ADD CONSTRAINT chk_user_role CHECK (role IN ('USER', 'ADMIN'))
