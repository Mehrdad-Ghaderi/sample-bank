databaseChangeLog:
  - changeSet:
      id: 007-create-revoked-access-token
      author: mehrdad
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: revoked_access_token
      changes:
        - createTable:
            tableName: revoked_access_token
            columns:
              - column:
                  name: jti
                  type: varchar(36)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_revoked_access_token
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - createIndex:
            tableName: revoked_access_token
            indexName: idx_revoked_access_token_expires_at
            columns:
              - column:
                  name: expires_at
